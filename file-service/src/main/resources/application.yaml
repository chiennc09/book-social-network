server:
  port: 8084
  servlet:
    context-path: /file

spring:
  application:
    name: file-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://root:root@localhost:27017/file-service?authSource=admin}
  servlet:
    multipart:
      enabled: true
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:200MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:210MB}

# ── MinIO Configuration ────────────────────────────────────────────────────────
# MINIO_ENDPOINT: internal Docker network URL (service-to-service only)
# Files are stored with RELATIVE object keys (e.g. "covers/uuid_name.jpg").
# The public URL is NOT stored in the DB — clients reconstruct it from their own config.
minio:
  endpoint:    ${MINIO_ENDPOINT:http://localhost:9000}
  access-key:  ${MINIO_ACCESS_KEY:minioadmin}
  secret-key:  ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET_NAME:book-social-network}
  use-ssl:     ${MINIO_USE_SSL:false}