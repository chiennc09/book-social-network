server:
  port: 8084
  servlet:
    context-path: /file
spring:
  application:
    name: file-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://root:root@localhost:27017/file-service?authSource=admin}
  servlet:
    multipart:
      enabled: true
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:200MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:210MB}

# MinIO Configuration
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET_NAME:book-social-network}
  use-ssl: ${MINIO_USE_SSL:false}
  # Public URL: must be accessible from the client (mobile/browser)
  # Local dev (emulator): http://10.0.2.2:9000
  # Local dev (real device): http://<your-lan-ip>:9000
  # Production: https://minio.yourdomain.com
  public-url: ${MINIO_PUBLIC_URL:http://localhost:9000}

app:
  file:
    download-prefix: ${APP_FILE_DOWNLOAD_PREFIX:http://localhost:8888/file/media/download/}