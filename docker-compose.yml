version: "3.8"
name: book-social-network

# ═══════════════════════════════════════════════════════════════════════════════
#  PRODUCTION-READY DOCKER COMPOSE
# ═══════════════════════════════════════════════════════════════════════════════
#
#  Domain / URL Strategy:
#  ─────────────────────
#  Files in MinIO are referenced by RELATIVE OBJECT KEYS in the database
#  (e.g. "covers/550e8400_photo.jpg"). No IP/domain is ever stored in the DB.
#
#  Each client configures its own base URL:
#    Mobile:    mobile-app/src/config/env.ts   → MINIO_PUBLIC_URL + API_GATEWAY_URL
#    Web:       web-app/.env                   → VITE_MINIO_PUBLIC_URL + VITE_API_GATEWAY_URL
#    Admin Web: admin-web/.env                 → VITE_MINIO_PUBLIC_URL + VITE_API_GATEWAY_URL
#
#  To switch environments, only update those client .env files + this compose file.
#  → No database migration, no backend code changes.
#
#  Port Map:
#    8888  API Gateway  (all external REST/WS traffic)
#    8080  identity-service
#    8091  profile-service
#    8082  notification-service
#    8083  post-service
#    8084  file-service
#    8085  book-service
#    8086  chat-service
#    8088  recommendation-service (internal: 8000)
#    9000  MinIO S3 API
#    9001  MinIO Web Console
#    3001  admin-web (Nginx)
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ════════════════════════════════════════════════════════════════════════════
  #  INFRASTRUCTURE
  # ════════════════════════════════════════════════════════════════════════════

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    hostname: kafka
    ports:
      - '9094:9094'
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_LOG_RETENTION_HOURS=168
      - KAFKA_LOG_SEGMENT_BYTES=1073741824
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  redis:
    image: redis:7.2.4-alpine
    container_name: redis
    hostname: redis
    ports:
      - '6379:6379'
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.8.3
    container_name: qdrant
    hostname: qdrant
    ports:
      - '6333:6333'
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio
    hostname: minio
    ports:
      - '9000:9000'   # S3 API — accessed by mobile/web via host machine IP/domain
      - '9001:9001'   # Web console
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════════════════════
  #  PYTHON SERVICE
  # ════════════════════════════════════════════════════════════════════════════

  recommendation-service:
    build: ./recommendation-service
    container_name: recommendation-service
    hostname: recommendation-service
    ports:
      - '8088:8000'
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://root:root@host.docker.internal:27017/recommendation-service?authSource=admin
      - BOOK_SERVICE_MONGODB_URL=mongodb://root:root@host.docker.internal:27017/book-service?authSource=admin
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════════════════════
  #  SPRING BOOT SERVICES
  # ════════════════════════════════════════════════════════════════════════════

  identity-service:
    build: ./identity-service
    container_name: identity-service
    hostname: identity-service
    ports:
      - '8080:8080'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/identity_service
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - APP_SERVICES_PROFILE=http://profile-service:8091/profile
      - JWT_SIGNER_KEY=${JWT_SIGNER_KEY:?JWT_SIGNER_KEY must be set in .env}
    depends_on:
      kafka:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  profile-service:
    build: ./profile-service
    container_name: profile-service
    hostname: profile-service
    ports:
      - '8091:8091'
    environment:
      - SPRING_NEO4J_URI=bolt://host.docker.internal:7687
      - SPRING_NEO4J_AUTHENTICATION_USERNAME=neo4j
      - SPRING_NEO4J_AUTHENTICATION_PASSWORD=${NEO4J_PASSWORD:-12345678}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  notification-service:
    build: ./notification-service
    container_name: notification-service
    hostname: notification-service
    ports:
      - '8082:8082'
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://root:root@host.docker.internal:27017/notification-service?authSource=admin
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - BREVO_API_URL=https://api.brevo.com
      - BREVO_API_KEY=${BREVO_API_KEY:-xkeysib-placeholder-replace-me}
    depends_on:
      kafka:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  post-service:
    build: ./post-service
    container_name: post-service
    hostname: post-service
    ports:
      - '8083:8083'
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://root:root@host.docker.internal:27017/post-service?authSource=admin
      - APP_SERVICES_PROFILE_URL=http://profile-service:8091/profile
    depends_on:
      kafka:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  file-service:
    build: ./file-service
    container_name: file-service
    hostname: file-service
    ports:
      - '8084:8084'
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://root:root@host.docker.internal:27017/file-service?authSource=admin
      # ── MinIO (internal Docker network — service-to-service) ────────────────
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-book-social-network}
      - MINIO_USE_SSL=false
      # ── File upload limits ──────────────────────────────────────────────────
      - SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE=200MB
      - SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE=210MB
    depends_on:
      minio:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  book-service:
    build: ./book-service
    container_name: book-service
    hostname: book-service
    ports:
      - '8085:8085'
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://root:root@host.docker.internal:27017/book-service?authSource=admin
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - APP_SERVICES_PROFILE_URL=http://profile-service:8091/profile
    depends_on:
      kafka:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  chat-service:
    build: ./chat-service
    container_name: chat-service
    hostname: chat-service
    ports:
      - '8086:8086'
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://root:root@host.docker.internal:27017/chat-service?authSource=admin
      - APP_SERVICES_PROFILE_URL=http://profile-service:8091/profile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    hostname: api-gateway
    ports:
      - '8888:8888'
    environment:
      # ── Internal service URLs (Docker DNS — never expose these externally) ──
      - IDENTITY_SERVICE_URL=http://identity-service:8080
      - PROFILE_SERVICE_URL=http://profile-service:8091
      - NOTIFICATION_SERVICE_URL=http://notification-service:8082
      - POST_SERVICE_URL=http://post-service:8083
      - FILE_SERVICE_URL=http://file-service:8084
      - BOOK_SERVICE_URL=http://book-service:8085
      - CHAT_SERVICE_URL=http://chat-service:8086
      - CHAT_SERVICE_WS_URL=ws://chat-service:8086
      - RECOMMENDATION_SERVICE_URL=http://recommendation-service:8000
      # ── Upload buffer (200 MB) ──────────────────────────────────────────────
      - GATEWAY_MAX_IN_MEMORY_SIZE=209715200
    depends_on:
      - identity-service
      - profile-service
      - notification-service
      - post-service
      - file-service
      - book-service
      - chat-service
      - recommendation-service
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════════════════════
  #  FRONTEND CLIENTS
  # ════════════════════════════════════════════════════════════════════════════

  admin-web:
    build:
      context: ./admin-web
      args:
        # Gateway URL accessible from the BROWSER (host machine → Docker)
        # Local dev:  http://localhost:8888
        # Production: https://api.yourdomain.com
        VITE_API_GATEWAY_URL: ${VITE_API_GATEWAY_URL:-http://localhost:8888}
        # MinIO URL accessible from the BROWSER
        # Local dev:  http://localhost:9000
        # Production: https://cdn.yourdomain.com
        VITE_MINIO_PUBLIC_URL: ${VITE_MINIO_PUBLIC_URL:-http://localhost:9000}
        VITE_MINIO_BUCKET: ${MINIO_BUCKET_NAME:-book-social-network}
    container_name: admin-web
    hostname: admin-web
    ports:
      - '3001:80'
    depends_on:
      - api-gateway
    restart: unless-stopped

  # web-app:
  #   build:
  #     context: ./web-app
  #     args:
  #       VITE_API_GATEWAY_URL: ${VITE_API_GATEWAY_URL:-http://localhost:8888}
  #       VITE_MINIO_PUBLIC_URL: ${VITE_MINIO_PUBLIC_URL:-http://localhost:9000}
  #       VITE_MINIO_BUCKET: ${MINIO_BUCKET_NAME:-book-social-network}
  #   container_name: web-app
  #   ports:
  #     - '3000:80'
  #   depends_on:
  #     - api-gateway
  #   restart: unless-stopped

volumes:
  kafka_data:
  qdrant_data:
  minio_data:
